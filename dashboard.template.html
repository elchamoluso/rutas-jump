<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Rutas — Dashboard local</title>
<style>
  /* CSS crítica mínima. Todo el estilo de componentes viene del CSS de React Spectrum
     inlineado DENTRO del bundle. Aquí solo: layout a pantalla completa, color del accent
     leído del DATA, y un fondo pre-paint para evitar el flash blanco antes de montar. */
  html, body, #root { margin: 0; height: 100%; }
  #root { min-height: 100vh; }
  body { background: #1d1d1d; }
  @media (prefers-color-scheme: light) { body { background: #f5f6f8; } }
  /* Fallback visible si el bundle no cargó (no debería pasar en una instalación correcta). */
  #boot-fallback { display: none; padding: 24px; font: 14px/1.5 system-ui, sans-serif; color: #888; }
</style>
</head>
<body>
  <div id="root"><div id="boot-fallback">Cargando dashboard…</div></div>

  <!-- 1) DATA: se reinyecta en cada escaneo (node-only). Mantiene el escaping de siempre. -->
  <script>/*__DATA__*/</script>

  <!-- 2) Inyección del accent ANTES de montar (theme.js lo lee como --rutas-accent). -->
  <script>
    (function () {
      try {
        var b = (window.DATA && window.DATA.brand) || {};
        if (b.accent) document.documentElement.style.setProperty('--rutas-accent', b.accent);
        document.title = (b.emoji || '🗂️') + ' ' + (b.title || 'Rutas') + ' — Dashboard local';
        // Si en 3s no montó React, muestra el fallback (diagnóstico).
        setTimeout(function () {
          var fb = document.getElementById('boot-fallback');
          if (fb && document.getElementById('root').childElementCount <= 1) {
            fb.style.display = 'block';
            fb.textContent = 'No se pudo montar la UI. Reconstruye el bundle: npm run build (rutas-web-rebuild).';
          }
        }, 3000);
      } catch (e) {}
    })();
  </script>

  <!-- 3) Bundle React + React Spectrum, inlineado y 100% offline (sin CDN). -->
  <script>/*__BUNDLE__*/</script>
</body>
</html>

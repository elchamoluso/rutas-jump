<!DOCTYPE html>
<html lang="es" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>🗂️ Rutas — Dashboard local</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* === Tokens del sistema de diseño "Rutas" (Google Stitch) === */
  :root{
    --bg:#131313; --surface:#131313; --s-lowest:#0e0e0e; --s-low:#1c1b1b; --s-cont:#201f1f;
    --s-high:#2a2a2a; --s-highest:#353534;
    --on-surface:#e5e2e1; --on-variant:#c1c6d7; --outline:#8b90a0; --outline-variant:#414754;
    --accent:#0070f3; --accent-soft:#aec6ff; --on-accent:#ffffff;
    --sec-cont:#464747; --on-sec-cont:#d6d5d5;
    --green:#11e379; --green-text:#60ff98; --code-bg:#0a192f;
    --error:#ffb4ab;
    --r-sm:4px; --r:8px; --r-md:12px;
    --topbar:rgba(19,19,19,.8);
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  /* === Tema claro automático (sigue el ajuste del sistema) === */
  @media (prefers-color-scheme: light){
    :root{
      --bg:#f5f6f8; --surface:#ffffff; --s-lowest:#ffffff; --s-low:#f0f2f4; --s-cont:#f1f3f5;
      --s-high:#e9ebef; --s-highest:#e3e6ea; --topbar:rgba(255,255,255,.85);
      --on-surface:#1b2026; --on-variant:#5b6573; --outline:#aab2bd; --outline-variant:#e2e6ea;
      --accent:#0070f3; --accent-soft:#0a5bd0; --on-accent:#ffffff;
      --sec-cont:#e6effd; --on-sec-cont:#0a5bd0; --error:#b3261e;
    }
    /* bloques de comando y toast permanecen en estilo "terminal" oscuro */
    #toast{background:#1b2026;color:#fff;border-color:#39414c}
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--on-surface);font-size:14px;line-height:1.5;
    -webkit-font-smoothing:antialiased}
  ::selection{background:rgba(0,112,243,.3)}
  .app{display:flex;min-height:100vh}

  /* === Sidebar === */
  .sidebar{position:sticky;top:0;height:100vh;width:248px;flex-shrink:0;display:flex;flex-direction:column;
    gap:8px;padding:16px;background:var(--s-low);border-right:1px solid var(--outline-variant);overflow-y:auto}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 6px;margin-bottom:14px}
  .logo{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:rgba(0,112,243,.18);border:1px solid var(--outline-variant);font-size:17px}
  .brand-name{font-weight:600;font-size:18px;color:var(--accent-soft);line-height:1.1}
  .brand-sub{font-family:var(--mono);font-size:11px;color:var(--on-variant)}
  .nav{display:flex;flex-direction:column;gap:4px;flex:1}
  .nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);border:none;
    background:none;color:var(--on-variant);font-family:var(--sans);font-size:13px;cursor:pointer;text-align:left;
    transition:all .15s}
  .nav-item:hover{background:var(--s-high);color:var(--on-surface)}
  .nav-item.active{background:var(--sec-cont);color:var(--on-sec-cont);font-weight:500}
  .nav-item .ico{font-size:15px;width:18px;text-align:center}
  .nav-foot{margin-top:auto;padding-top:10px;border-top:1px solid var(--outline-variant)}
  .foot-meta{font-size:11px;color:var(--on-variant);line-height:1.5;padding:2px 6px;
    overflow:hidden;text-overflow:ellipsis}

  /* === Workspace === */
  .workspace{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:12px;padding:10px 16px;
    background:var(--topbar);backdrop-filter:blur(8px);border-bottom:1px solid var(--outline-variant)}
  .search-wrap{position:relative;flex:1;max-width:520px}
  .search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.6;pointer-events:none}
  .search{width:100%;background:var(--s-cont);border:1px solid var(--outline-variant);border-radius:var(--r);
    padding:8px 10px 8px 30px;color:var(--on-surface);font-size:13px;font-family:var(--sans)}
  .search::placeholder{color:rgba(193,198,215,.5)}
  .search:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,112,243,.35)}
  .topbar-actions{display:flex;align-items:center;gap:8px;margin-left:auto}

  /* === Tira de actualización === */
  .updatestrip{display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    background:rgba(0,112,243,.10);border-bottom:1px solid rgba(0,112,243,.25);padding:9px 16px}
  .us-text{font-size:13px;color:var(--accent-soft);display:flex;align-items:center;gap:8px;flex-wrap:wrap}

  /* === Canvas === */
  .canvas{flex:1;padding:20px;max-width:980px;width:100%;margin:0 auto}
  .count{color:var(--on-variant);font-size:12px;margin:2px 2px 10px}

  /* === Tarjetas de primer nivel (favoritos, raíces, categorías) === */
  details{border:1px solid var(--outline-variant);border-radius:var(--r);background:var(--s-lowest);
    margin-bottom:10px;overflow:hidden}
  summary{cursor:pointer;display:flex;align-items:center;gap:8px;list-style:none;padding:6px 12px;border-radius:0}
  summary::-webkit-details-marker{display:none}
  summary::before{content:"▸";color:var(--on-variant);transition:transform .2s;flex-shrink:0;width:12px;
    text-align:center;font-size:12px}
  details[open]>summary::before{transform:rotate(90deg)}
  #view-rutas>details>summary,#view-comandos>details>summary{background:var(--s-low);font-weight:600;padding:10px 14px}
  #view-rutas>details>summary:hover,#view-comandos>details>summary:hover{background:var(--s-high)}
  #view-rutas>details[open]>summary,#view-comandos>details[open]>summary{border-bottom:1px solid var(--outline-variant)}
  .badge{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--on-variant);
    background:var(--s-highest);border:1px solid var(--outline-variant);border-radius:var(--r-sm);padding:1px 7px}
  .body{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
  .src-link{align-self:flex-start;font-size:12px;color:var(--accent-soft);text-decoration:none;
    padding:2px 4px;margin-bottom:2px}
  .src-link:hover{text-decoration:underline}

  /* === Nodos anidados del árbol === */
  details details{border:none;background:transparent;margin:0;border-radius:0;overflow:visible}
  details details>summary{font-weight:400}
  details details>summary:hover{background:var(--s-cont)}
  .tbody{padding-left:12px;margin-left:12px;border-left:1px solid var(--outline-variant)}
  .tline{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:0}
  .tline.leaf:hover{background:var(--s-cont)}
  .tspacer{display:inline-block;width:12px;flex-shrink:0}
  .tname{font-size:14px;white-space:nowrap;flex-shrink:0}
  .tcount{font-family:var(--mono);font-size:11px;color:var(--on-variant);opacity:.6;flex-shrink:0}
  .tline.leaf .tname{color:var(--on-variant)}
  /* acciones del árbol: aparecen al pasar el ratón (o con foco de teclado) */
  summary .acts,.tline .acts{opacity:0;transition:opacity .12s}
  summary:hover .acts,summary:focus-within .acts,.tline:hover .acts,.tline:focus-within .acts{opacity:1}
  /* cabecera de página */
  .page-head{margin:2px 2px 14px}
  .page-head h2{margin:0;font-size:24px;font-weight:600;letter-spacing:-.01em;color:var(--on-surface)}
  .page-head p{margin:4px 0 0;font-size:13px;color:var(--on-variant)}
  /* cabecera de cada raíz/sección (My Drive · Unidades Compartidas · Linux) */
  .section-head{margin:22px 2px 10px;font-size:13px;font-weight:600;text-transform:uppercase;
    letter-spacing:.04em;color:var(--accent-soft);display:flex;align-items:center;gap:10px}
  .section-head::after{content:"";flex:1;height:1px;background:var(--outline-variant)}
  .section-head:first-of-type{margin-top:8px}
  /* scrollbar oscuro */
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--s-highest);border-radius:5px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:var(--outline-variant)}
  /* raíz sin subcarpetas: tarjeta no expandible */
  #view-rutas>.rootflat{border:1px solid var(--outline-variant);border-radius:var(--r);background:var(--s-low);margin-bottom:10px}
  #view-rutas>.rootflat>.tline{padding:10px 14px}
  #view-rutas>.rootflat .tname{font-weight:600}

  /* === Filas planas (búsqueda / favoritos) === */
  .row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:var(--r);
    border:1px solid transparent}
  .row:hover{background:var(--surface);border-color:var(--outline-variant)}
  .row-main{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
  .name{background:none;border:none;color:var(--on-surface);font-size:14px;cursor:pointer;padding:2px 4px;
    border-radius:var(--r-sm);text-align:left;white-space:nowrap;flex-shrink:0;font-family:var(--sans)}
  .name:hover{color:var(--accent-soft)}
  .rel{color:var(--on-variant);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    font-family:var(--mono)}

  /* === Chips de alias (cd-*) === */
  .chip{background:var(--s-high);color:var(--accent-soft);border:1px solid var(--outline-variant);
    border-radius:var(--r-sm);padding:2px 7px;font-size:11px;font-family:var(--mono);cursor:pointer;flex-shrink:0}
  .chip:hover{border-color:var(--accent);color:#fff}

  /* === Botones de acción === */
  .acts{display:flex;gap:6px;margin-left:auto;flex-shrink:0}
  button.act{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--outline-variant);
    background:transparent;color:var(--on-variant);border-radius:var(--r);padding:5px 11px;font-size:12px;
    font-family:var(--sans);cursor:pointer;white-space:nowrap;transition:all .12s}
  button.act:hover{background:var(--s-high);color:var(--on-surface);border-color:var(--outline)}
  button.act:active{transform:scale(.96)}
  button.act.primary{background:var(--accent);color:var(--on-accent);border-color:var(--accent)}
  button.act.primary:hover{filter:brightness(1.1);color:var(--on-accent)}
  button.copied{background:var(--green)!important;color:#00210c!important;border-color:var(--green)!important}

  /* === Bloques de comando === */
  .code{font-family:var(--mono);background:var(--code-bg);color:var(--green-text);
    border:1px solid rgba(96,255,152,.2);border-radius:var(--r);padding:5px 9px;font-size:12px;cursor:pointer;
    text-align:left;white-space:pre-wrap;word-break:break-word;line-height:1.6}
  .code:hover{filter:brightness(1.2)}
  .desc{color:var(--on-variant);font-size:13px}

  /* === Toast === */
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(14px);
    display:flex;align-items:center;gap:8px;background:var(--s-highest);border:1px solid var(--outline-variant);
    color:var(--on-surface);padding:9px 16px;border-radius:var(--r);font-size:13px;
    box-shadow:0 8px 24px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:all .25s;z-index:60}
  #toast::before{content:"✓";color:var(--green-text);font-weight:700}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.err{border-color:var(--error)}
  #toast.err::before{content:"✗";color:var(--error)}

  .empty{color:var(--on-variant);padding:24px;text-align:center}
  .hidden{display:none!important}

  @media(max-width:760px){
    .app{flex-direction:column}
    .sidebar{position:static;width:auto;height:auto;flex-direction:row;align-items:center;
      border-right:none;border-bottom:1px solid var(--outline-variant);padding:10px 12px}
    .brand{margin-bottom:0}
    .brand-sub{display:none}
    .nav{flex-direction:row;flex:0;margin-left:8px}
    .nav-foot{display:none}
    .canvas{padding:14px}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">🗂️</div>
      <div>
        <div class="brand-name">Rutas</div>
        <div class="brand-sub">dashboard local</div>
      </div>
    </div>
    <nav class="nav">
      <button class="nav-item tab active" data-tab="rutas"><span class="ico">📁</span> Rutas</button>
      <button class="nav-item tab" data-tab="comandos"><span class="ico">⌨️</span> Comandos</button>
    </nav>
    <div class="nav-foot">
      <div class="foot-meta" id="meta"></div>
    </div>
  </aside>

  <div class="workspace">
    <header class="topbar">
      <div class="search-wrap">
        <span class="search-ico">🔎</span>
        <input class="search" id="search" placeholder="Buscar carpeta, ruta o comando…  (pulsa /)" autocomplete="off" spellcheck="false">
      </div>
      <div class="topbar-actions">
        <button class="act" id="updateCopy" title="Copiar el comando de actualización">⧉ rutas-web</button>
      </div>
    </header>

    <div class="updatestrip">
      <span class="us-text">
        🔄 Actualizar las rutas:
        <button class="act primary hidden" id="refreshNow">Actualizar ahora</button>
        <span id="termHint">o ejecútalo en el terminal:</span>
        <button class="code" id="updateCmd" title="Copiar comando">rutas-web</button>
      </span>
    </div>

    <main class="canvas">
      <div class="count" id="count"></div>
      <div id="results" class="hidden"></div>
      <div id="view-rutas"></div>
      <div id="view-comandos" class="hidden"></div>
    </main>
  </div>
</div>
<div id="toast"></div>
<script>
/*__DATA__*/

(function(){
  "use strict";
  const $ = s => document.querySelector(s);
  function el(tag, cls){ const e = document.createElement(tag); if (cls) e.className = cls; return e; }
  function actBtn(label, fn){ const b = el('button','act'); b.textContent = label; b.onclick = fn; return b; }

  // ---- copiar (con fallback para file://) ----
  let toastT;
  function toast(msg, isErr){
    const t = $('#toast'); t.textContent = msg; t.className = 'show' + (isErr ? ' err' : '');
    clearTimeout(toastT); toastT = setTimeout(()=>{ t.className = t.className.replace('show',''); }, 1400);
  }
  async function copyText(text, btn){
    let ok = false;
    try { await navigator.clipboard.writeText(text); ok = true; }
    catch (e) {
      try {
        const ta = el('textarea'); ta.value = text;
        ta.style.position = 'fixed'; ta.style.top = '-1000px'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.focus(); ta.select();
        ok = document.execCommand('copy'); document.body.removeChild(ta);
      } catch (e2) { ok = false; }
    }
    toast(ok ? 'Copiado al portapapeles' : 'No se pudo copiar', !ok);
    if (ok && btn){ btn.classList.add('copied'); setTimeout(()=>btn.classList.remove('copied'), 900); }
  }

  // ---- árbol de rutas: cada carpeta con sus alias cd- y botones; expande nivel a nivel ----
  function aliasChips(node, main, inSummary){
    const al = DATA.aliasByPath[node.abs];
    if (!al) return;
    al.forEach(a=>{ const c = el('button','chip'); c.textContent = a; c.title = 'Copiar alias';
      c.onclick = ev=>{ if (inSummary) ev.stopPropagation(); copyText(a, c); }; main.appendChild(c); });
  }
  function treeContent(container, node, inSummary){
    if (!inSummary) container.appendChild(el('span','tspacer'));
    const main = el('div','row-main');
    const hasCh = node.children && node.children.length;
    const name = el('span','tname'); name.textContent = (hasCh ? '📂 ' : '📁 ') + node.name; main.appendChild(name);
    if (hasCh){ const c = el('span','tcount'); c.textContent = '[' + node.children.length + ']'; main.appendChild(c); }
    aliasChips(node, main, inSummary);
    container.appendChild(main);
    const acts = el('div','acts');
    const bP = el('button','act'); bP.textContent = 'Copiar ruta'; bP.title = 'Copiar ruta absoluta';
    bP.onclick = ev=>{ if (inSummary) ev.stopPropagation(); copyText(node.abs, bP); };
    const bC = el('button','act'); bC.textContent = 'cd'; bC.title = 'Copiar comando cd';
    bC.onclick = ev=>{ if (inSummary) ev.stopPropagation(); copyText('cd "' + node.abs + '"', bC); };
    acts.appendChild(bP); acts.appendChild(bC);
    container.appendChild(acts);
  }
  function renderNode(node){
    if (node.children && node.children.length){
      const d = el('details');
      const s = el('summary'); treeContent(s, node, true);
      d.appendChild(s);
      const body = el('div','tbody'); d.appendChild(body);
      let built = false;
      d.addEventListener('toggle', ()=>{
        if (d.open && !built){ built = true;
          const frag = document.createDocumentFragment();
          node.children.forEach(c=>frag.appendChild(renderNode(c)));
          body.appendChild(frag);
        }
      });
      return d;
    }
    const row = el('div','tline leaf'); treeContent(row, node, false); return row;
  }
  function emptyRootCard(node){
    const card = el('div','rootflat');
    const row = el('div','tline'); treeContent(row, node, false);
    card.appendChild(row); return card;
  }
  // Construye el árbol de UNA sección. El índice es por `rel` DENTRO de la sección,
  // así que dos secciones con el mismo `rel` no colisionan (mapa nuevo por llamada).
  function buildSectionTree(section){
    const map = new Map();
    (section.roots || []).forEach(r=> map.set(r, { name:r, rel:r, abs: section.base + '/' + r, children:[] }));
    (section.folders || []).forEach(f=> map.set(f.rel, { name:f.name, rel:f.rel, abs:f.abs, children:[] }));
    (section.folders || []).forEach(f=>{
      const i = f.rel.lastIndexOf('/');
      const parent = map.get(i === -1 ? f.root : f.rel.slice(0, i)) || map.get(f.root);
      if (parent) parent.children.push(map.get(f.rel));
    });
    map.forEach(n=> n.children.sort((a,b)=>a.name.localeCompare(b.name)));
    return (section.roots || []).map(r=>map.get(r)).filter(Boolean);
  }

  // ---- fila plana (favoritos y resultados de búsqueda) ----
  function flatRow(f, withRel){
    const row = el('div','row');
    const main = el('div','row-main');
    const name = el('button','name'); name.textContent = '📁 ' + f.name;
    name.title = 'Copiar ruta absoluta'; name.onclick = ()=>copyText(f.abs, name);
    main.appendChild(name);
    if (withRel){ const rel = el('span','rel'); rel.textContent = f.rel; main.appendChild(rel); }
    aliasChips(f, main, false);
    row.appendChild(main);
    const acts = el('div','acts');
    const bP = actBtn('Copiar ruta', ()=>copyText(f.abs, bP));
    const bC = el('button','act'); bC.textContent = 'cd'; bC.title = 'Copiar comando cd'; bC.onclick = ()=>copyText('cd "' + f.abs + '"', bC);
    acts.appendChild(bP); acts.appendChild(bC);
    row.appendChild(acts);
    return row;
  }
  function favRow(fav){
    const row = el('div','row');
    const main = el('div','row-main');
    const alias = el('button','chip'); alias.textContent = fav.alias; alias.title = 'Copiar alias';
    alias.onclick = ()=>copyText(fav.alias, alias); main.appendChild(alias);
    const rel = el('span','rel'); rel.textContent = fav.rel; main.appendChild(rel);
    row.appendChild(main);
    const acts = el('div','acts');
    const bP = actBtn('Copiar ruta', ()=>copyText(fav.abs, bP));
    const bC = el('button','act'); bC.textContent = 'cd'; bC.title = 'Copiar comando cd'; bC.onclick = ()=>copyText('cd "' + fav.abs + '"', bC);
    acts.appendChild(bP); acts.appendChild(bC);
    row.appendChild(acts);
    return row;
  }
  function cmdRow(c){
    const row = el('div','row');
    const main = el('div','row-main');
    const code = el('button','code'); code.textContent = c.cmd; code.title = 'Copiar comando'; code.onclick = ()=>copyText(c.cmd, code);
    main.appendChild(code);
    if (c.desc){ const d = el('span','desc'); d.textContent = c.desc; main.appendChild(d); }
    row.appendChild(main);
    const acts = el('div','acts'); const b = actBtn('Copiar', ()=>copyText(c.cmd, b)); acts.appendChild(b);
    row.appendChild(acts);
    return row;
  }

  // ---- vista Rutas ----
  function buildRutas(){
    const root = $('#view-rutas'); root.textContent = '';
    const head = el('div','page-head'); const h = el('h2'); h.textContent = 'Explorador de Rutas';
    const sub = el('p'); sub.textContent = 'Click en una carpeta para expandir. Copia la ruta o el alias cd- con un clic.';
    head.appendChild(h); head.appendChild(sub); root.appendChild(head);
    if (DATA.favorites && DATA.favorites.length){
      const d = el('details'); const s = el('summary'); s.textContent = '⭐ Favoritos';
      const badge = el('span','badge'); badge.textContent = DATA.favorites.length; s.appendChild(badge);
      d.appendChild(s);
      const body = el('div','body'); DATA.favorites.forEach(f=>body.appendChild(favRow(f)));
      d.appendChild(body); root.appendChild(d);
    }
    (DATA.sections || []).forEach(section=>{
      const sh = el('div','section-head'); sh.textContent = section.label; root.appendChild(sh);
      const trees = buildSectionTree(section);
      if (!trees.length){ const e = el('div','empty'); e.textContent = '(sin carpetas)'; root.appendChild(e); return; }
      trees.forEach(n=>root.appendChild(n.children.length ? renderNode(n) : emptyRootCard(n)));
    });
  }

  // ---- vista Comandos ----
  function buildComandos(){
    const root = $('#view-comandos'); root.textContent = '';
    const head = el('div','page-head'); const h = el('h2'); h.textContent = 'Directorio de Comandos';
    const sub = el('p'); sub.textContent = 'Referencia rápida de CLIs. Copia cualquier comando con un clic.';
    head.appendChild(h); head.appendChild(sub); root.appendChild(head);
    const cats = (DATA.commands && DATA.commands.categories) || [];
    if (!cats.length){ const e = el('div','empty'); e.textContent = 'No hay comandos en commands.json'; root.appendChild(e); return; }
    cats.forEach((cat, i)=>{
      const d = el('details'); if (i === 0) d.open = true;
      const s = el('summary'); s.textContent = (cat.icon ? cat.icon + ' ' : '') + cat.name;
      const badge = el('span','badge'); badge.textContent = (cat.commands || []).length; s.appendChild(badge);
      d.appendChild(s);
      const body = el('div','body');
      if (cat.source){
        const a = el('a','src-link'); a.href = cat.source; a.target = '_blank'; a.rel = 'noopener';
        a.textContent = '📖 Documentación oficial'; body.appendChild(a);
      }
      (cat.commands || []).forEach(c=>body.appendChild(cmdRow(c)));
      d.appendChild(body); root.appendChild(d);
    });
  }

  // ---- búsqueda ----
  const CAP = 500;
  function runSearch(q){
    const results = $('#results'), count = $('#count');
    const rutasView = $('#view-rutas'), cmdView = $('#view-comandos');
    if (!q){
      results.classList.add('hidden'); results.textContent = ''; count.textContent = '';
      rutasView.classList.toggle('hidden', activeTab !== 'rutas');
      cmdView.classList.toggle('hidden', activeTab !== 'comandos');
      return;
    }
    rutasView.classList.add('hidden'); cmdView.classList.add('hidden');
    results.classList.remove('hidden'); results.textContent = '';
    const ql = q.toLowerCase();
    if (activeTab === 'rutas'){
      const all = (DATA.sections || []).flatMap(s=>s.folders).filter(f=>f.name.toLowerCase().includes(ql) || f.rel.toLowerCase().includes(ql));
      count.textContent = (all.length > CAP ? CAP + ' de ' : '') + all.length + ' carpetas';
      const frag = document.createDocumentFragment();
      all.slice(0, CAP).forEach(f=>frag.appendChild(flatRow(f, true)));
      results.appendChild(frag);
      if (all.length > CAP){ const m = el('div','count'); m.textContent = '… ' + (all.length - CAP) + ' más. Afina la búsqueda.'; results.appendChild(m); }
      if (!all.length){ const e = el('div','empty'); e.textContent = 'Sin resultados'; results.appendChild(e); }
    } else {
      const cats = (DATA.commands && DATA.commands.categories) || []; let n = 0;
      const frag = document.createDocumentFragment();
      cats.forEach(cat=>(cat.commands || []).forEach(c=>{
        if (c.cmd.toLowerCase().includes(ql) || (c.desc || '').toLowerCase().includes(ql)){ frag.appendChild(cmdRow(c)); n++; }
      }));
      count.textContent = n + ' comandos';
      if (!n){ const e = el('div','empty'); e.textContent = 'Sin resultados'; results.appendChild(e); }
      else results.appendChild(frag);
    }
  }

  // ---- nav (tabs) ----
  let activeTab = 'rutas';
  document.querySelectorAll('.tab').forEach(t=>t.onclick = ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active'); activeTab = t.dataset.tab;
    runSearch($('#search').value.trim());
  });

  // ---- branding (desde rutas.config.sh) ----
  const brand = DATA.brand || {};
  const brandTitle = brand.title || 'Rutas';
  const brandEmoji = brand.emoji || '🗂️';
  if (brand.accent) document.documentElement.style.setProperty('--accent', brand.accent);
  document.title = brandEmoji + ' ' + brandTitle + ' — Dashboard local';
  { const bn = document.querySelector('.brand-name'); if (bn) bn.textContent = brandTitle;
    const lg = document.querySelector('.logo'); if (lg) lg.textContent = brandEmoji; }

  // ---- init ----
  const meta = $('#meta');
  meta.textContent = DATA.stats.folderCount + ' carpetas · ' + DATA.stats.sectionCount + ' raíces · act. ' + DATA.generatedAtHuman;
  meta.title = (DATA.sections || []).map(s=>s.label + ': ' + s.base).join('\n');
  $('#updateCmd').onclick = ()=>copyText('rutas-web', $('#updateCmd'));
  $('#updateCopy').onclick = ()=>copyText('rutas-web', $('#updateCopy'));
  if (location.protocol === 'http:' || location.protocol === 'https:'){
    const rn = $('#refreshNow'); rn.classList.remove('hidden');
    const th = $('#termHint'); if (th) th.textContent = 'o, en el terminal:';
    rn.onclick = async ()=>{
      const old = rn.textContent; rn.textContent = 'Actualizando…'; rn.disabled = true;
      try {
        const r = await fetch('/api/regenerate', { cache: 'no-store' });
        const j = await r.json();
        if (j && j.ok){ location.reload(); return; }
      } catch (e) {}
      rn.textContent = old; rn.disabled = false; toast('No se pudo actualizar', true);
    };
  }
  buildRutas(); buildComandos();
  const search = $('#search');
  search.addEventListener('input', ()=>runSearch(search.value.trim()));
  document.addEventListener('keydown', e=>{
    if (e.key === '/' && document.activeElement !== search){ e.preventDefault(); search.focus(); }
    if (e.key === 'Escape' && document.activeElement === search){ search.value = ''; runSearch(''); search.blur(); }
  });
})();
</script>
</body>
</html>
